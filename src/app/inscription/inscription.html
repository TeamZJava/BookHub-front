<main class="page">
  <h2>Inscription</h2>

  <section class="formulaire" aria-label="Formulaire d'inscription">
    <form (ngSubmit)="onSubmit()" #registerForm="ngForm" novalidate>

    <div class="champ-horizontal">
      <label for="nom">Nom <span class="requis">*</span></label>
      <input id="nom" type="text"
             [(ngModel)]="nom"
             name="nom"
             placeholder="Entrez votre nom"
             autocomplete="family-name"
             aria-required="true"
             required />
    </div>

    <div class="champ-horizontal">
      <label for="prenom">Prénom <span class="requis">*</span></label>
      <input id="prenom" type="text"
             [(ngModel)]="prenom"
             name="prenom"
             placeholder="Entrez votre prénom"
             autocomplete="given-name"
             aria-required="true"
             required />
    </div>

    <div class="champ-horizontal">
      <label for="email">Email <span class="requis">*</span></label>
      <div>
        <input id="email" type="email"
               [(ngModel)]="email"
               name="email"
               #emailInput="ngModel"
               placeholder="Entrez votre email"
               autocomplete="email"
               aria-required="true"
               required
               email />
        @if (emailInput.invalid && emailInput.touched) {
          <p class="erreur-champ" role="alert">Veuillez entrer un email valide.</p>
        }
      </div>
    </div>

    <div class="champ-horizontal">
      <label for="telephone">Téléphone</label>
      <input id="telephone" type="tel"
             [(ngModel)]="telephone"
             name="telephone"
             placeholder="Entrez votre numéro de téléphone"
             autocomplete="tel" />
    </div>

    <div class="champ-horizontal">
      <label for="mdp">Mot de passe <span class="requis">*</span></label>
      <div class="input-mdp" role="group" aria-label="Mot de passe">
        <input id="mdp"
               [type]="showPassword ? 'text' : 'password'"
               [(ngModel)]="motDePasse"
               name="motDePasse"
               placeholder="Entrez votre mot de passe"
               autocomplete="new-password"
               aria-required="true"
               required />
        <button type="button"
                tabindex="-1"
                (click)="showPassword = !showPassword"
                [attr.aria-label]="showPassword ? 'Masquer le mot de passe' : 'Afficher le mot de passe'">
          &#128065;
        </button>
      </div>
    </div>

    <div class="champ-horizontal">
      <label for="confirmMdp">Confirmer le mot de passe <span class="requis">*</span></label>
      <div class="input-mdp" role="group" aria-label="Confirmation du mot de passe">
        <input id="confirmMdp"
               [type]="showConfirm ? 'text' : 'password'"
               [(ngModel)]="confirmMotDePasse"
               name="confirmMotDePasse"
               placeholder="Confirmez votre mot de passe"
               autocomplete="new-password"
               aria-required="true"
               required />
        <button type="button"
                tabindex="-1"
                (click)="showConfirm = !showConfirm"
                [attr.aria-label]="showConfirm ? 'Masquer la confirmation' : 'Afficher la confirmation'">
          &#128065;
        </button>
      </div>
    </div>

    @if (erreur) {
      <p class="erreur" role="alert">{{ erreur }}</p>
    }

    <div class="cg">
      <input id="cg" type="checkbox"
             [(ngModel)]="cgAcceptees"
             name="cgAcceptees"
             aria-required="true" />
      <label for="cg">
        J'ai lu et j'accepte les Conditions Générales d'Utilisation et je reconnais
        avoir pris connaissance de la Politique de Confidentialité relative au
        traitement de mes données personnelles.
      </label>
    </div>

    <p class="legende">* Champs obligatoires</p>

    <button type="submit" class="btn-bleu" aria-label="Créer mon compte">
      Créer compte
    </button>

    <div class="liens">
      <a routerLink="/connexion">Retour connexion</a>
    </div>

    </form>
  </section>
</main>
